name: Selenium CI Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build and Run Tests
        run: mvn clean test -e

      - name: Check Reports Folder
        run: |
          echo "Current directory:"
          pwd
          echo "Project files:"
          ls -la
          echo "Reports folder:"
          ls -la Reports || echo "Reports folder does not exist"
          echo "Find html files:"
          find . -name "*.html"  

      - name: Upload Extent Report
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: Reports/ndosiAutomation.html
